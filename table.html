<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>

    <style>
        td{
            text-align: center;
            background-color: aqua;
        }
        th{
            background-color: yellow;
        }
        table{
            background-color: black;
        }
    </style>
</head>
<body>
    <h1>Table in HTML</h1>
    <table border="5" height="250" width="350" cellspacing="5" cellpadding="8">
        
        <caption><b>EMPLOYEE TABLE</b></caption>
        <tr>
            <th>E_id</th>
            <th>E_name</th>
            <th>E_salary</th>
            
        </tr>
        <tr>
            <td>1</td>
            <td>selva</td>
            <td>100000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>sakthi</td>
            <td>120000</td>
        </tr>
        <tr>
            <td>3</td>
            <td>maari</td>
            <td>110000</td>
        </tr>
        <tr>
            <td>4</td>
            <td>sri</td>
            <td>75000</td>
        </tr>
    </table>

    

</body>
</html>
